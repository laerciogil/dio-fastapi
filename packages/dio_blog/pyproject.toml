[project]
name = "dio-blog"
version = "0.1.0"
description = "Add your description here"
license = "MIT"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "databases[aiosqlite]>=0.9.0",
    "fastapi>=0.135.3",
    "pyjwt>=2.12.1",
    "uvicorn[standard]>=0.44.0",
]

[project.scripts]
dio-blog = "dio_blog.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["./src/dio_blog"]

[tool.ruff]
extend = "../pyproject.toml"

[tool.pyright]
extend = "../pyproject.toml"

[tool.pytest]
extend = "../pyproject.toml"
